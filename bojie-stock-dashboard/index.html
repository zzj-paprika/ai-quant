        function filterData(period) {
            const now = new Date(rawData[rawData.length - 1].date);
            let cutoff;
            switch (period) {
                case '1m':
                    cutoff = new Date(now);

                    } else {
                        let sum = 0;
                        for (let j = i - days + 1; j <= i; j++) {

                        result.push(+(sum / days).toFixed(2));

                        html += '最低: ' + d.low.toFixed(2) + '<br/>';
                        const chg = d.close - prevClose;
                        const pct = chg / prevClose * 100;
                        html += '涨跌: <span style="color:' + (chg >= 0 ? UP_COLOR : DOWN_COLOR) + '">' +
                            (chg >= 0 ? '+' : '') + chg.toFixed(2) + ' (' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%)</span><br/>';
                        html += '成交量: ' + (d.vol / 10000).toFixed(2) + '万手<br/>';
                        html += '成交额: ' + (d.amount / 100000000).toFixed(2) + '亿';
                        return html;
                    }
                },
                grid: { left: '6%', right: '3%', top: '12%', bottom: '2%' },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLine: { onZero: false },
                    axisLabel: {
                        fontSize: 11,
                        color: '#999',
                        interval: Math.max(Math.floor(data.length / 12), 1)
                    },
                    splitLine: { show: false },
                    min: 'dataMin',
                    max: 'dataMax'
                },
                yAxis: {
                    scale: true,
                    splitArea: { show: true, areaStyle: { color: ['rgba(250,250,250,0.3)', 'rgba(200,200,200,0.1)'] } },
                    axisLabel: { fontSize: 11, color: '#999' },
                    splitLine: { lineStyle: { color: '#eee', type: 'dashed' } }
                },
                dataZoom: [{
                    type: 'inside',
                    start: 0,
                    end: 100,
                    minValueSpan: 10
                }],
                series: [{
                    name: 'K线',
                    type: 'candlestick',
                    data: klineData,
                    itemStyle: {
                        color: UP_COLOR,
                        color0: DOWN_COLOR,
                        borderColor: UP_COLOR,
                        borderColor0: DOWN_COLOR
                    },
                    markPoint: {
                        data: [{
                                name: '最高',
                                type: 'max',
                                valueDim: 'highest',
                                symbol: 'pin',
                                symbolSize: 40,
                                label: { formatter: '{c}', fontSize: 10, color: '#333' },
                                itemStyle: { color: '#e74c3c' }
                            },
                            {
                                name: '最低',
                                type: 'min',
                                valueDim: 'lowest',
                                symbol: 'pin',
                                symbolSize: 40,
                                label: { formatter: '{c}', fontSize: 10, color: '#333' },
                                itemStyle: { color: '#27ae60' }
                            }
                        ]
                    },
                    markLine: {
                        silent: true,
                        data: [{
                            yAxis: last.close,
                            label: {
                                formatter: '收盘 ' + last.close.toFixed(2),
                                position: 'end',
                                fontSize: 11,
                                color: '#666'
                            },
                            lineStyle: { color: '#999', type: 'dashed', width: 1 }
                        }]
                    }
                }, {
                    name: 'MA5',
                    type: 'line',
                    data: ma5,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { width: 1.5, color: MA5_COLOR },
                    itemStyle: { color: MA5_COLOR }
                }, {
                    name: 'MA10',
                    type: 'line',
                    data: ma10,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { width: 1.5, color: MA10_COLOR },
                    itemStyle: { color: MA10_COLOR }
                }, {
                    name: 'MA20',
                    type: 'line',
                    data: ma20,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { width: 1.5, color: MA20_COLOR },
                    itemStyle: { color: MA20_COLOR }
                }]
            };
        }

        function buildVolumeOption(data) {
            const dates = data.map(d => d.date.slice(5));
            const volumes = data.map(d => d.vol);
            const colors = data.map(d => d.close >= d.open ? VOL_UP_COLOR : VOL_DOWN_COLOR);
            // 计算5日均量
            const volMA5 = [];
            for (let i = 0; i < volumes.length; i++) {
                if (i < 4) { volMA5.push('-'); } else {
                    let sum = 0;
                    for (let j = i - 4; j <= i; j++) sum += volumes[j];
                    volMA5.push(+(sum / 5).toFixed(0));
                }
            }

            return {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: 'rgba(255,255,255,0.95)',
                    borderColor: '#ddd',
                    borderWidth: 1,
                    textStyle: { color: '#333', fontSize: 12 },
                    formatter: function(params) {
                        const idx = params[0].dataIndex;
                        const d = data[idx];
                        return '<strong>' + d.date + '</strong><br/>' +
                            '成交量: ' + (d.vol / 10000).toFixed(2) + '万手<br/>' +
                            '成交额: ' + (d.amount / 100000000).toFixed(2) + '亿';
                    }
                },
                grid: { left: '6%', right: '3%', top: '8%', bottom: '2%' },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLabel: {
                        fontSize: 11,
                        color: '#999',
                        interval: Math.max(Math.floor(data.length / 12), 1)
                    },
                    splitLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        fontSize: 11,
                        color: '#999',
                        formatter: function(v) { return (v / 10000).toFixed(0) + '万'; }
                    },
                    splitLine: { lineStyle: { color: '#eee', type: 'dashed' } }
                },
                dataZoom: [{
                    type: 'inside',
                    start: 0,
                    end: 100,
                    minValueSpan: 10
                }],
                series: [{
                    name: '成交量',
                    type: 'bar',
                    data: volumes.map((v, i) => ({
                        value: v,
                        itemStyle: { color: colors[i] }
                    })),
                    barWidth: '60%'
                }, {
                    name: 'MA5(量)',
                    type: 'line',
                    data: volMA5,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { width: 1.5, color: '#e67e22' },
                    itemStyle: { color: '#e67e22' }
                }]
            };
        }

        // 渲染图表
        const klineChart = echarts.init(document.getElementById('klineChart'));
        const volumeChart = echarts.init(document.getElementById('volumeChart'));

        let currentData = rawData;
        klineChart.setOption(buildOption(currentData));
        volumeChart.setOption(buildVolumeOption(currentData));

        // 联动
        klineChart.group = 'group1';
        volumeChart.group = 'group1';
        echarts.connect('group1');

        // 周期切换
        document.querySelectorAll('.period-selector button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-selector button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const period = this.dataset.period;
                currentData = filterData(period);
                klineChart.setOption(buildOption(currentData), true);
                volumeChart.setOption(buildVolumeOption(currentData), true);
            });
        });

        // 自适应
        window.addEventListener('resize', function() {
            klineChart.resize();
            volumeChart.resize();
        });
    </script>
</body>
</html>
